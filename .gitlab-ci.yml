---
variables:
    DOCKER_IMAGENAME: vivek29git/gitlab_pipeline
    DOCKER_IMAGETAG: ypws_v1
stages:
    - build
    - deploy
build_image:
    stage: build
    image: docker:29.2.1-cli    
    services: 
        - docker:29.2.1-dind
    variables:
        DOCKER_TLS_CERTDIR: "/certs" 
    before_script:
        - docker login -u $DOCKER_USRNM -p $DOCKER_PASS
    script:
        - docker build -t $DOCKER_IMAGENAME:$DOCKER_IMAGETAG .
        - docker push $DOCKER_IMAGENAME:$DOCKER_IMAGETAG
deploy_app_k8s:
    stage: deploy
    image: alpine:latest
    needs: 
        - build_image
    before_script:
        - apk add --no-cache curl bash
        - curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        - chmod +x kubectl
        - mv kubectl /usr/local/bin/
        - echo "$KUBE_CONFIG_DATA" | base64 -d > /tmp/kubeconfig
        - export KUBECONFIG=/tmp/kubeconfig
    script:
        - kubectl apply -f deployment.yml
        - kubectl apply -f service.yml