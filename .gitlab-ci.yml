---
variables:
    DOCKER_IMAGENAME: vivek29git/gitlab_pipeline
    DOCKER_IMAGETAG: ypws_v1
stages:
    - build
    - deploy
build_image:
    stage: build
    image: docker:29.2.1-cli    
    services: 
        - docker:29.2.1-dind
    variables:
        DOCKER_TLS_CERTDIR: "/certs" 
    before_script:
        - docker login -u $DOCKER_USRNM -p $DOCKER_PASS
    script:
        - docker build -t $DOCKER_IMAGENAME:$DOCKER_IMAGETAG .
        - docker push $DOCKER_IMAGENAME:$DOCKER_IMAGETAG
deploy_k8s:
    stage: deploy
    image: bitnami/kubectl:latest #Kubectl will be installed in runner to execute kube commands in runner to deploy app in cluster
    needs: 
        - build_image # Just a dependency to make sure build stage is executed before deploy stage, as we need to push image in registry before deploying app in cluster
    before_script:
        - echo "$KUBE_CONFIG_DATA" | base64 -d > /tmp/kubeconfig # Variable contains encrypted info of cluster data
        - export KUBECONFIG=/tmp/kubeconfig # Used to connect to cluster from git runner, using the cluster info from above varible
    script:
        - kubectl apply -f deployment.yml # Once after connecting to cluster, kubctl in git runner will deploys the application
        - kubectl apply -f service.yml # Service will be deplaoyed in cluster via runner and used to expose application running in pod to outside world